# 内置技能配置。
# 默认只启用 safe 技能；confirm/danger 技能必须显式启用。
profiles:
  local:
    enabled:
      - calculator
      - unit_convert
      - format_json
      - summarize_text
      - extract_key_points
      - translate_text
      - plan_task
      - get_time_local
      - system_status
      - config_get
      - tool_list
    allow_danger: false       # 风险：不要默认开启危险工具。
  qwen:
    enabled: [calculator, get_time_local, system_status, tool_list]
    allow_danger: false
  deepseek:
    enabled: [calculator, get_time_local, system_status, tool_list]
    allow_danger: false
  kimi:
